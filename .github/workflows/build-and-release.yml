name: Build and Release Fritzing part package

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure zip is installed
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip

      - name: Determine part version
        run: |
          set -e
          PART_DIR='ZS-042 Real Time Clock Module - 4 pin only'
          VERSION_FILE="$PART_DIR/part.zs-042-4-pin-only.fzp"
          VERSION=$(grep -oP '(?<=<version>)[^<]+' "$VERSION_FILE" | head -n 1)
          [ -n "$VERSION" ] || { echo "version not found" >&2; exit 1; }
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create fzpz archive
        run: |
          set -e
          PART_DIR='ZS-042 Real Time Clock Module - 4 pin only'
          OUT="$PART_DIR-v${VERSION}.fzpz"
          rm -f "$OUT"
          pushd "$PART_DIR"
          zip -0 -r "../$OUT" .
          popd
          ls -l "$OUT"
          echo "FZPZ_PATH=$OUT" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: '${{ env.FZPZ_PATH }}'
          path: '${{ env.FZPZ_PATH }}'
          archive: false

  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure zip is installed
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip

      - name: Determine part version
        run: |
          set -e
          PART_DIR='ZS-042 Real Time Clock Module - 4 pin only'
          VERSION_FILE="$PART_DIR/part.zs-042-4-pin-only.fzp"
          VERSION=$(grep -oP '(?<=<version>)[^<]+' "$VERSION_FILE" | head -n 1)
          [ -n "$VERSION" ] || { echo "version not found" >&2; exit 1; }
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create fzpz archive for release
        run: |
          set -e
          PART_DIR='ZS-042 Real Time Clock Module - 4 pin only'
          OUT="$PART_DIR-v${VERSION}.fzpz"
          rm -f "$OUT"
          pushd "$PART_DIR"
          zip -0 -r "../$OUT" .
          popd
          ls -l "$OUT"
          echo "FZPZ_PATH=$OUT" >> $GITHUB_ENV

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: '${{ env.FZPZ_PATH }}'
          asset_name: '${{ env.FZPZ_PATH }}'
          asset_content_type: application/zip
