name: Determine part version
description: Extracts the version from the part file and provides VERSION as an output
inputs:
  part_path:
    description: 'Path to the .fzp part file'
    required: true
outputs:
  version:
    description: 'Part version extracted from the file'
    value: ${{ steps.determine.outputs.version }}
runs:
  using: "composite"
  steps:
    - name: Determine part version
      id: determine
      shell: bash
      run: |
        set -e
        VERSION_FILE="${{ inputs.part_path }}"
        VERSION=$(grep -oP '(?<=<version>)[^<]+' "$VERSION_FILE" | head -n 1)
        [ -n "$VERSION" ] || { echo "version not found" >&2; exit 1; }
        echo "version=$VERSION" >> $GITHUB_OUTPUT
